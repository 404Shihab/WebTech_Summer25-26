<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="../Design/style.css">
</head>

<body>

    <div class="header">
        <h1>Student Registration Form</h1>
    </div>

    <div class="container">
        <form>
            <fieldset>
                <legend>Personal Information</legend>
                <table>
                    <tr>
                        <td><label for="fname">Full Name</label></td>
                        <td>
                            <input type="text" name="fname" id="fname" placeholder="Enter Your Full Name" required>
                        </td>
                    </tr>

                    <tr>
                        <td><label for="email">Email Address</label></td>
                        <td>
                            <input type="email" name="email" id="email" placeholder="Enter Your Email Address" required>
                        </td>
                    </tr>

                    <tr>
                        <td><label for="phone">Phone Number</label></td>
                        <td>
                            <input type="tel" name="phone" id="phone" placeholder="Enter Your Phone Number" required>
                        </td>
                    </tr>

                    <tr>
                        <td><label for="dob">Date of Birth</label></td>
                        <td>
                            <input type="date" name="dob" id="dob">
                        </td>
                    </tr>
                    <tr>
                        <td>Gender</td>
                        <td>

                            <input type="radio" name="gender" id="male" value="Male">
                            <label for="male">Male</label>
                            <input type="radio" name="gender" id="female" value="Female">
                            <label for="female">Female</label>
                        </td>
                    </tr>
                </table>

            </fieldset>

            <fieldset>
                <legend>Academic Information</legend>
                <table>
                    <tr>
                        <td><label for="studentID">Student ID</label></td>
                        <td>
                            <input type="text" name="studentID" id="studentID" placeholder="Enter Your Student ID">
                        </td>
                    </tr>
                    <tr>
                        <td><label for="department">Department</label></td>
                        <td>
                            <select name="department" id="department">

                                <option value="">--- Select Department ---</option>
                                <option value="CSE">CSE</option>
                                <option value="EEE">EEE</option>
                                <option value="BBA">BBA</option>
                                <option value="IPE">IPE</option>
                                <option value="COE">COE</option>
                                <option value="LLB">LLB</option>

                            </select>

                        </td>
                    </tr>
                    <tr>
                        <td><label for="semester">Semester</label></td>
                        <td>
                            <select name="semester" id="semester">
                                <option value="">--- Select Semester ---</option>
                                <option value="1st">1st</option>
                                <option value="2nd">2nd</option>
                                <option value="3rd">3rd</option>
                                <option value="4th">4th</option>
                                <option value="5th">5th</option>
                                <option value="6th">6th</option>
                                <option value="7th">7th</option>
                                <option value="8th">8th</option>
                                <option value="9th">9th</option>
                                <option value="10th">10th</option>
                                <option value="11th">11th</option>
                                <option value="12th">12th</option>
                            </select>
                        </td>
                    </tr>

                </table>
            </fieldset>

            <fieldset>
                <legend>Hobbies</legend>

                <input type="checkbox" name="hobbies" id="reading" value="Reading">
                <label for="reading">Reading</label>

                <input type="checkbox" name="hobbies" id="sports" value="Sports">
                <label for="sports">Sports</label>

                <input type="checkbox" name="hobbies" id="music" value="Music">
                <label for="music">Music</label>

                <input type="checkbox" name="hobbies" id="traveling" value="Traveling">
                <label for="traveling">Traveling</label>
            </fieldset>


            <fieldset>

                <legend>Address</legend>
                <textarea name="address" id="address" rows="5" cols="50" placeholder="Enter Your Address"></textarea>

            </fieldset>
            <fieldset>

                <legend>Profile Picture</legend>
                <input type="file" name="profile" id="profile">
            </fieldset>

            <fieldset>
                <legend>Terms & Conditions</legend>
                <input type="checkbox" name="terms" id="terms" required>
                <label for="terms">I agree to the Terms & Conditions</label>

            </fieldset>

            <br>
            <input type="submit" value="Register">
            <input type="reset" value="Reset">

        </form>
    </div>

</body>

</html>
