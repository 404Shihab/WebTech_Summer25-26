<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Registration</title>
</head>
<body>
    <div class="container">
        <h1>User Registration Form</h1>
        <form>
            <fieldset>
                <legend>Personal Information</legend>
                <table>
                    <tr>
                        <td><label for="fname">First Name*</label></td>
                        <td><input type="text" id="fname" name="fname" placeholder="Enter your first name" required></td>
                    </tr>

                    <tr>
                        <td><label for="lname">Last Name*</label></td>
                        <td><input type="text" id="lname" name="lname" placeholder="Enter your Last name" required></td>
                    </tr>
                    <tr>
                        <td><label for="DOB">Date of Birth*</label></td>
                        <td><input type="date" id="DOB" name="DOB"></td>
                    </tr>

                    <tr>
                        <td><label for="gender">Gender*</label></td>
                        <td>
                            <input type="radio" id="male" name="gender" value="male">
                            <label for="male">Male</label>
                            <input type="radio" id="female" name="gender" value="female">
                            <label for="female">Female</label>
                            <input type="radio" id="other" name="gender" value="other">
                            <label for="other">Other</label>
                            
                        </td>
                    </tr>
                </table>
            </fieldset>
            <fieldset>
                <legend>Contact Information</legend>
                <table>
                    <tr>
                        <td><label for="email">Email Address*</label></td>
                        <td><input type="email" name="email" id="email"></td>
                    </tr>
                    <tr>
                        <td><label for="phone">Phone Number*</label></td>
                        <td><input type="number" name="phone" id="phone"></td>
                    </tr>
                    <tr>
                        <td><label for="address">Address</label></td>
                        <td><textarea name="address" id="address" placeholder="Enter your full address"></textarea></td>
                    </tr>
                </table>
            </fieldset>
        </form>
    </div>
</body>
</html>
